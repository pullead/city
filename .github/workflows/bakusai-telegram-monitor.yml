name: Bakusai Telegram Monitor

on:
  schedule:
    - cron: '0 22,23,0-14 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bakusai-telegram-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run Bakusai Telegram monitor
        run: npm run bakusai:tg
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BAKUSAI_THREAD_URL: https://bakusai.com/thr_res/acode=18/ctgid=103/bid=436/tid=13315868/tp=1/#tab=0
          BAKUSAI_THREAD_ID: '13315868'
          BAKUSAI_THREAD_TITLE: Bakusai 13315868
          BAKUSAI_MAX_PAGES: '30'
          TG_NOTIFY_HISTORY_WHEN_NO_NEW: 'true'
          TG_TRANSLATE_TO_ZH: 'true'
          TG_ENFORCE_PUSH_HOURS: 'true'
          TG_MAX_MESSAGE_CHARS: '3500'

      - name: Wait before girls digest
        run: sleep 10

      - name: Run Girls Telegram digest
        run: npm run girls:tg
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TG_GIRLS_MAX_MESSAGE_CHARS: '3800'
          TG_GIRLS_ENFORCE_PUSH_HOURS: 'true'

      - name: Commit monitor state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .crawler-state/bakusai-monitor.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update bakusai monitor state"
            git push
          fi
