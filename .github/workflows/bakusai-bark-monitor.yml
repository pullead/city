name: Bakusai Bark Monitor

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bakusai-bark-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run Bakusai Bark monitor
        run: npm run bakusai:bark
        env:
          BARK_API_URL: ${{ secrets.BARK_API_URL }}
          BAKUSAI_THREAD_URL: https://bakusai.com/thr_res/acode=18/ctgid=103/bid=436/tid=13315868/tp=1/#tab=0
          BAKUSAI_THREAD_ID: '13315868'
          BAKUSAI_THREAD_TITLE: Bakusai 13315868
          BAKUSAI_MAX_PAGES: '1'
          BARK_NOTIFY_HISTORY_WHEN_NO_NEW: 'true'
          BARK_HISTORY_POST_LIMIT: '20'
          BARK_NOTIFICATION_POST_LIMIT: '20'
          BARK_TRANSLATE_TO_ZH: 'true'

      - name: Commit monitor state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .crawler-state/bakusai-monitor.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update bakusai monitor state"
            git push
          fi
